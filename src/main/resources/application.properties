spring.application.name=INESIS-BACKEND

#------------------- CONFIG DB -------------------
spring.datasource.url=jdbc:mysql://localhost:3306/inesis
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

#------------------- CONFIG DATA.SQL -------------------
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:/data.sql

#------------------CONFIG RUTA DEL RECIBO DE LUZ-----------------------
archivos.recibo.luz.carpeta=src/main/resources/ReciboLuz

# Configuracion de carpetas para archivos
app.upload.dir=uploads-inesis
app.upload.personas-dependientes.dir=${app.upload.dir}/personas-dependientes
app.upload.recibo-luz.dir=${app.upload.dir}/recibo-luz

#------------------PREFIJO API --------------------------
server.servlet.context-path=/api

#------------------- CONFIG MULTIPART FILE UPLOAD -------------------
spring.servlet.multipart.max-file-size=80MB
spring.servlet.multipart.max-request-size=80MB